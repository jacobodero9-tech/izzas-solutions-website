<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ company.name }} | Electrical Installations & Electronics{% endblock %}</title>
<meta name="description" content="{{ company.name }} — electrical installations, repairs and genuine electronics sales in {{ company.location }}. Call or WhatsApp {{ company.phone_display }}.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="wire-rail" aria-hidden="true"></div>

<header class="site-header">
  <div class="container header-inner">
    <a href="{{ url_for('home') }}" class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none">
          <path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="currentColor"/>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">IZZAS</span>
        <span class="brand-sub">SOLUTIONS</span>
      </span>
    </a>

    <nav class="main-nav">
      <a href="{{ url_for('home') }}" class="{{ 'active' if request.endpoint == 'home' }}">Home</a>
      <a href="{{ url_for('about') }}" class="{{ 'active' if request.endpoint == 'about' }}">About</a>
      <a href="{{ url_for('services') }}" class="{{ 'active' if request.endpoint == 'services' }}">Services</a>
      <a href="{{ url_for('contact') }}" class="{{ 'active' if request.endpoint == 'contact' }}">Contact</a>
    </nav>

    <a href="tel:+{{ company.phone_intl }}" class="header-call">
      <span class="mono">{{ company.phone_display }}</span>
    </a>
  </div>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <span class="brand-name">IZZAS SOLUTIONS</span>
      <p>{{ company.tagline }}</p>
    </div>
    <div class="footer-contact">
      <a href="tel:+{{ company.phone_intl }}" class="mono">{{ company.phone_display }}</a>
      <a href="{{ company.whatsapp_link }}" target="_blank" rel="noopener">WhatsApp us</a>
      <a href="mailto:{{ company.email }}">{{ company.email }}</a>
      <span>{{ company.location }}</span>
    </div>
  </div>
  <div class="container footer-bottom">
    <span>&copy; {{ 2026 }} {{ company.name }}. All rights reserved.</span>
  </div>
</footer>

<a href="{{ company.whatsapp_link }}" class="whatsapp-fab" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">
  <svg viewBox="0 0 32 32" width="26" height="26" fill="currentColor">
    <path d="M16.001 3C9.373 3 4 8.373 4 15c0 2.34.65 4.53 1.78 6.4L4 29l7.79-1.74A11.94 11.94 0 0016 27c6.627 0 12-5.373 12-12S22.628 3 16.001 3zm0 21.6c-1.98 0-3.83-.55-5.41-1.5l-.39-.23-4.63 1.03 1.02-4.5-.25-.4A9.57 9.57 0 015.4 15c0-5.85 4.75-10.6 10.6-10.6S26.6 9.15 26.6 15 21.85 24.6 16 24.6zm5.86-7.94c-.32-.16-1.9-.94-2.2-1.05-.29-.11-.51-.16-.72.16-.21.32-.83 1.04-1.02 1.26-.19.21-.38.24-.7.08-.32-.16-1.34-.49-2.55-1.57-.94-.84-1.58-1.87-1.76-2.19-.19-.32-.02-.49.14-.65.14-.14.32-.38.48-.56.16-.19.21-.32.32-.54.11-.21.05-.4-.03-.56-.08-.16-.72-1.74-.99-2.38-.26-.62-.53-.54-.72-.55-.19-.01-.4-.01-.61-.01-.21 0-.56.08-.85.4-.29.32-1.12 1.09-1.12 2.66 0 1.57 1.15 3.09 1.31 3.3.16.21 2.26 3.45 5.47 4.84.76.33 1.36.53 1.82.68.77.24 1.46.21 2.01.13.61-.09 1.9-.78 2.17-1.53.27-.75.27-1.4.19-1.53-.08-.13-.29-.21-.61-.37z"/>
  </svg>
</a>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
